kind = "web"
previewPath = "/"
title = "CV Harta Dwi Jaya"
version = "1.0.0"
id = "artifacts/harta-dwi-jaya"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23391

[services.development]
run = "pnpm --filter @workspace/harta-dwi-jaya run dev"

